<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Pro UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; }

        /* --- UI MATCHING YOUR IMAGE --- */
        .shaka-bottom-controls {
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        /* Spinner fix */
        .shaka-spinner-container { opacity: 0 !important; visibility: hidden !important; }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1 !important; visibility: visible !important;
        }

        /* Custom Refresh Button Style */
        .shaka-refresh-button { font-size: 1.2em; cursor: pointer; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    // --- CUSTOM BUTTON LOGIC ---
    class RefreshButton extends shaka.ui.Element {
      constructor(parent, controls) {
        super(parent, controls);
        this.button_ = document.createElement('button');
        this.button_.classList.add('shaka-refresh-button');
        this.button_.innerHTML = "🔄"; // You can use an icon here
        this.parent.appendChild(this.button_);
        this.eventManager.listen(this.button_, 'click', () => {
          window.location.reload();
        });
      }
    }

    const RefreshButtonFactory = {
      create: (parent, controls) => new RefreshButton(parent, controls)
    };

    shaka.ui.Controls.registerElement('refresh', RefreshButtonFactory);

    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        // --- UI CONFIGURATION ---
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': [
                'play_pause', 
                'time_and_duration', 
                'mute', 
                'volume', 
                'spacer', 
                'quality', 
                'language', 
                'refresh', // Our custom button
                'fullscreen', 
                'overflow_menu'
            ],
            'addCustomButtons': true
        });

        // URL Parsing logic
        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 6,
                rebufferingGoal: 2,
                lowLatencyMode: true,
                stallThreshold: 1,
                jumpOnHung: true
            },
            manifest: { dash: { ignoreMinBufferTime: true } }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            await video.play();
        } catch (e) {
            console.error("Load Error:", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
