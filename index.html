<script>
    // URL se data nikalne ka logic
    const params = new URLSearchParams(window.location.search);
    const destination = params.get('url'); // Ye 'url=' ke baad wali link uthayega

    if (destination) {
        // Redirect logic: 2 second baad link par bhej dega
        setTimeout(() => {
            window.location.href = destination;
        }, 2000);
    } else {
        document.body.innerHTML = "<h1>Koi link nahi mila!</h1>";
    }
</script>
