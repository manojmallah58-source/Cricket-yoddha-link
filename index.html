<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Container settings */
        .shaka-video-container { width: 100%; height: 100%; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Bottom Controls Bar Styling */
        .shaka-controls-container {
            background: linear-gradient(transparent, rgba(0,0,0,0.8)) !important;
        }

        .shaka-bottom-controls {
            display: flex;
            align-items: center;
            padding: 0 10px !important;
        }

        /* Seekbar (Neeche ki line) ko stylish banane ke liye */
        .shaka-range-container { margin: 0 5px !important; }

        /* Logo and Title */
        #channelTitle {
            position: absolute;
            left: 15px;
            top: 15px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 10;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player id="videoContainer">
    <video autoplay muted playsinline id="video"></video>
    <div id="channelTitle">Live Stream</div>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('videoContainer');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, videoContainer, video);

        // --- UI Configuration (Saare buttons ek line mein) ---
        const config = {
            'controlPanelElements': [
                'play_pause',      // Play button
                'time_and_duration', // Time
                'spacer',          // Beech ka space
                'mute',            // Mute/Unmute
                'volume',          // Volume slider
                'quality',         // Settings/Quality
                'fullscreen',      // Fullscreen
                'overflow_menu'    // Extra options
            ],
            'addLanguageControls': true,
            'castReceiverAppId': '7.1.5',
            'clearBufferOnQualityChange': true
        };
        ui.configure(config);

        // URL Parsing logic
        const fullUrl = window.location.href;
        let streamUrl = "";
        let kid = "", key = "";

        if (fullUrl.includes("url=")) {
            streamUrl = fullUrl.split("url=")[1].split("|")[0].split("&")[0];
        }

        // DRM Parse (PV-CDN and others)
        if (fullUrl.includes("drmLicense=")) {
            const drmData = fullUrl.split("drmLicense=")[1].split("&")[0];
            const keys = drmData.split(":");
            kid = keys[0];
            key = keys[1];
        }

        if (kid && key) {
            player.configure({
                drm: { clearKeys: { [kid]: key } }
            });
        }

        // Networking Engine
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (streamUrl.includes('jio')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13)";
            }
        });

        try {
            await player.load(streamUrl);
        } catch (e) {
            console.error("Error loading stream", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
