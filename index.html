<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Smooth Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function init() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        // --- AGGRESSIVE CONFIG FOR NO BUFFERING ---
        player.configure({
            streaming: {
                bufferingGoal: 0.5,           // Sirf 0.5 sec ka data milte hi play karo
                rebufferingGoal: 0.5,         // Lag hote hi turant load karo
                bufferBehind: 0,              // Peeche ka data clear rakho memory free karne ke liye
                lowLatencyMode: true,         // Live match latency kam karega
                jumpLargeGaps: true,          // Gap aate hi jump karo, loading mat dikhao
                infiniteRebuffering: false    // Atakne par load karte mat raho, next segment pakdo
            },
            manifest: {
                retryParameters: { 
                    maxAttempts: 10,          // Retry more times
                    baseDelay: 500            // Retry faster
                }
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        let m3u8OrMpd = urlParams.get('url');
        let kid = urlParams.get('keyId');
        let key = urlParams.get('key');

        // DRM Setup (Ensure format is correct)
        if (kid && key) {
            player.configure({
                drm: {
                    clearKeys: { [kid]: key },
                    retryParameters: { maxAttempts: 5 }
                }
            });
        }

        // Essential for Jio/Willow links that check origin
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (m3u8OrMpd.includes('jio') || m3u8OrMpd.includes('willow')) {
                // Request modifications if needed
            }
        });

        try {
            await player.load(m3u8OrMpd);
            video.play(); // Force play
        } catch (e) {
            console.error('Error Code:', e.code, 'Check if URL or Keys are valid.');
        }
    }

    document.addEventListener('shaka-ui-loaded', init);
    document.addEventListener('shaka-polyfill-installed', init);
</script>
</body>
</html>
