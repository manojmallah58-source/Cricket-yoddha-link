<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Shaka Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .manual-play-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9); color: white; padding: 15px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

<div class="shaka-video-container" data-shaka-player-container>
    <video autoplay id="video" data-shaka-player poster="https://blogger.googleusercontent.com/img/a/AVvXsEiGqaZeRBZ6Y7yV5ZYSRiNRhBa5q9_EMx7R5TJcHd3XJwwHh2YhNOGt76Y4vEcUIjvIaA7W-Tw1RyMLP-4WZwVHA4mk18zwXl7HdSL5WabprIasDOWJO7jpL0zTQB4p_y7X0Rv0xwe-cJ-GvxofAgeRp2FIiNgB90n_b8Cqw0sAaZqVhJg_fi9UyfSO8KY"></video>
    <div class="manual-play-button" id="manualPlayButton">CLICK TO PLAY</div>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById('video');
        const container = document.querySelector('.shaka-video-container');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, container, video);

        // 1. URL Parsing Logic
        const fullUrl = window.location.search.split('url=')[1];
        if (!fullUrl) return;

        // Deciding if it's a piped URL or standard params
        let manifestUri = decodeURIComponent(fullUrl.split('|')[0]);
        let keyId = "", key = "";

        if (fullUrl.includes('|drmLicense=')) {
            const licensePart = fullUrl.split('|drmLicense=')[1];
            [keyId, key] = licensePart.split(':');
        }

        // 2. DRM Config
        if (keyId && key) {
            player.configure({
                drm: {
                    clearKeys: { [keyId]: key }
                }
            });
        }

        // 3. Network Filters (JioTV/AIV Style)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            request.headers['Referer'] = 'https://www.jiotv.com/';
        });

        player.configure({
            streaming: {
                lowLatencyMode: true,
                jumpLargeGaps: true
            }
        });

        // 4. Load and Autoplay
        const manualBtn = document.getElementById('manualPlayButton');
        try {
            await player.load(manifestUri);
            await video.play().catch(() => {
                manualBtn.style.display = 'block';
            });
        } catch (e) {
            console.error("Load Error", e);
        }

        manualBtn.addEventListener('click', () => {
            video.play();
            manualBtn.style.display = 'none';
        });
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
    document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
