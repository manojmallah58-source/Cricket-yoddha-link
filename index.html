<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        /* Buffer circle ko force hide karne ke liye jab video load ho jaye */
        .shaka-buffering-spinner { display: none !important; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        // UI Configuration
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({ 'controlPanelElements': ['play_pause', 'mute', 'quality', 'fullscreen'] });

        // URL Parsing
        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        }

        if (!streamUrl) return;

        // --- AGGRESSIVE FIX FOR INSTANT PLAY ---
        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 1,           // 1 second ka buffer kafi hai
                rebufferingGoal: 0.5,
                lowLatencyMode: true,
                autoLowLatency: true,
                inaccuracy: 0.1,
                jumpOnHung: true           // Agar wheel ghoome toh aage jump kar jao
            },
            manifest: { dash: { ignoreMinBufferTime: true } } // DASH ke liye buffering ignore karega
        });

        // Networking Headers
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            if (streamUrl.includes('jio')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            // Video load hone se pehle hi use 'ready' state mein dalna
            await player.load(streamUrl);
            
            // Force Play Logic
            video.muted = true; 
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log("Video Started!");
                }).catch(error => {
                    // Agar browser block kare toh user click par chalao
                    console.log("Autoplay blocked, waiting for click");
                    window.addEventListener('click', () => { video.play(); }, { once: true });
                });
            }
        } catch (e) {
            console.error("Error:", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
