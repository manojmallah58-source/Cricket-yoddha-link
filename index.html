<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHDTV Master Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: sans-serif; }
        .card { background: #151921; border: 1px solid #2d333f; border-radius: 12px; }
        .btn-action { background: #2563eb; transition: 0.3s; }
        .btn-action:hover { background: #1d4ed8; transform: scale(1.02); }
        .result-box { background: #090c10; border: 1px solid #3b82f6; color: #60a5fa; font-family: monospace; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-2xl mx-auto">
        <div class="text-center my-6">
            <h1 class="text-2xl font-bold text-blue-500 uppercase tracking-tighter">DRM Master Extractor</h1>
            <p class="text-xs text-gray-500 italic">MPD, M3U8 & Clearkey Detector</p>
        </div>

        <div class="card p-5 mb-6 shadow-xl">
            <input type="text" id="targetUrl" class="w-full bg-[#0d1117] border border-gray-700 p-4 rounded-lg mb-4 outline-none focus:border-blue-500" placeholder="Paste Live Stream URL here...">
            
            <div class="flex items-center gap-2 mb-4">
                <hr class="flex-grow border-gray-800">
                <span class="text-[10px] text-gray-600 font-bold">OR</span>
                <hr class="flex-grow border-gray-800">
            </div>

            <textarea id="rawContent" rows="4" class="w-full bg-[#0d1117] border border-gray-700 p-3 rounded-lg text-xs font-mono mb-4" placeholder="Paste Page Source (Ctrl+U) here..."></textarea>
            
            <button onclick="startDeepScan()" id="scanBtn" class="w-full btn-action py-4 rounded-xl font-bold shadow-lg shadow-blue-900/20">
                START UNIVERSAL SCAN
            </button>
        </div>

        <div id="loader" class="hidden text-center text-blue-400 py-4 animate-pulse text-sm">Scanning for DRM Headers...</div>
        <div id="displayArea" class="space-y-4"></div>
    </div>

    <script>
        async function startDeepScan() {
            const url = document.getElementById('targetUrl').value.trim();
            const raw = document.getElementById('rawContent').value.trim();
            const display = document.getElementById('displayArea');
            const loader = document.getElementById('loader');
            
            display.innerHTML = '';

            if (raw) {
                analyze(raw);
            } else if (url) {
                loader.classList.remove('hidden');
                try {
                    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                    const resp = await fetch(proxy);
                    const data = await resp.json();
                    analyze(data.contents);
                } catch (e) {
                    alert("CORS Error! Please paste source code manually.");
                } finally {
                    loader.classList.add('hidden');
                }
            } else {
                alert("Please enter a URL or Source Code!");
            }
        }

        function analyze(text) {
            const display = document.getElementById('displayArea');
            const rules = {
                'DETECTED .MPD FILE': /(https?:\/\/[^\s"'<>]+\.mpd[^\s"'<>]*)/gi,
                'CLEARKEY DETECTED (KID:KEY)': /([a-f0-9]{32}:[a-f0-9]{32})/gi,
                'PSSH HEADER (BASE64)': /pssh["']?\s*[:=]\s*["']([a-zA-Z0-9+/=]{50,})["']|<cenc:pssh>([\s\S]*?)<\/cenc:pssh>/gi,
                'LICENSE URL': /(https?:\/\/[^\s"'<>]+\/(?:license|wv|drm)[^\s"'<>]*)/gi
            };

            let found = false;
            for (let [title, regex] of Object.entries(rules)) {
                let matches = [];
                let m;
                while ((m = regex.exec(text)) !== null) {
                    matches.push(m[1] || m[2] || m[0]);
                }

                if (matches.length > 0) {
                    found = true;
                    const section = document.createElement('div');
                    section.className = "card p-4 border-t-2 border-blue-600";
                    section.innerHTML = `<h3 class="text-blue-400 font-bold text-[10px] mb-3 uppercase tracking-widest">${title}</h3>`;
                    
                    [...new Set(matches)].forEach(item => {
                        section.innerHTML += `
                            <div class="result-box p-3 rounded mb-2 flex justify-between items-center overflow-hidden">
                                <span class="text-[11px] truncate mr-4">${item.trim()}</span>
                                <button onclick="navigator.clipboard.writeText('${item.trim()}'); alert('Copied!')" class="text-blue-500 font-bold text-[10px] hover:text-white">COPY</button>
                            </div>`;
                    });
                    display.appendChild(section);
                }
            }

            if (!found) display.innerHTML = '<p class="text-center text-red-500 text-sm">No DRM details found.</p>';
        }
    </script>
</body>
</html>
