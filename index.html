<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Instant Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; }
        /* Circle spinner ko hide karne ke liye agar stream chal rahi ho */
        .shaka-spinner-container { display: none !important; } 
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        // URL parsing logic
        const fullUrl = window.location.href;
        let streamUrl = "";
        if (fullUrl.includes("url=")) {
            streamUrl = fullUrl.split("url=")[1].split("|")[0].split("&")[0];
        }

        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const drmData = fullUrl.split("drmLicense=")[1].split("&")[0];
            const keys = drmData.split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        // --- AGGRESSIVE INSTANT PLAY SETTINGS ---
        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 0.5,         // Sirf 0.5 sec ka data aate hi play karega
                rebufferingGoal: 0.5,
                bufferBehind: 0,
                lowLatencyMode: true,
                autoLowLatency: true,
                forceTransmuxTS: true,      // TS files ko fast convert karne ke liye
                jumpOnHung: true,
                ignoreTextStreamFailures: true,
                alwaysStreamText: false
            },
            manifest: {
                dash: { autoCorrectDrift: true },
                retryParameters: { maxAttempts: 5, baseDelay: 100, backoffFactor: 1.2 }
            },
            abr: {
                enabled: false,             // Auto quality off karke seedha load karega
                defaultBandwidthEstimate: 100000 
            }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            // Jio/CDN streams ke liye headers
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            // Ek baar load hone ke baad turant play command
            video.muted = true; // Autoplay ensure karne ke liye
            video.play();
            console.log("Instant Play Done!");
        } catch (e) {
            console.error("Error:", e.code);
            // Agar fail ho toh refresh logic
            setTimeout(() => { window.location.reload(); }, 2000);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
