<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Ultra Fast Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        /* Buffering icon ko customize karne ke liye agar zaroorat ho */
        .shaka-spinner-svg { stroke: #ff0000 !important; } 
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video" poster="https://img.youtube.com/vi/j3_7v6O6XUo/maxresdefault.jpg"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById('video');
        const container = document.querySelector('.shaka-video-container');
        const player = new shaka.Player(video);
        
        // UI Overlay initialization
        const ui = new shaka.ui.Overlay(player, container, video);

        // --- URL SE DATA NIKALNE KA LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        const fullUrl = window.location.href;
        
        let streamUrl = "";
        if (fullUrl.includes("url=")) {
            streamUrl = fullUrl.split("url=")[1].split("|")[0].split("&")[0];
        }

        let kid = urlParams.get('keyId'), key = urlParams.get('key');
        if (fullUrl.includes("drmLicense=")) {
            const drmData = fullUrl.split("drmLicense=")[1].split("&")[0];
            const keys = drmData.split(":");
            kid = keys[0];
            key = keys[1];
        }

        if (!streamUrl) return;

        // --- ULTRA FAST CONFIGURATION (Buffering Fix) ---
        player.configure({
            drm: {
                clearKeys: (kid && key) ? { [kid]: key } : {}
            },
            streaming: {
                bufferingGoal: 3,           // Pehle ye 10+ tha, ab sirf 3s load karega
                rebufferingGoal: 1,         // 1 second ka data aate hi phir se chalu
                lowLatencyMode: true,       // Live streams ke liye sabse important
                autoLowLatency: true,
                inaccuracy: 0.1,            // Seek accuracy badhata hai
                jumpOnHung: true,           // Atakne par auto-skip karega
                stallThreshold: 1,          // 1 sec stall hote hi action lega
                infiniteLiveDelay: false
            },
            abr: {
                enabled: true,
                defaultBandwidthEstimate: 1000000, // Medium quality se shuru karega taki turant chale
                switchInterval: 1
            }
        });

        // --- HEADERS & REFRESH LOGIC ---
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            // Browser policy bypass karne ke liye
            video.play().catch(() => {
                console.log("Autoplay blocked, waiting for user interaction");
            });
            console.log("Cricket Yoddha Player Ready!");
        } catch (error) {
            console.error("Error Loading Stream:", error.code);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
