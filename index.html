<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Full Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }

        /* --- UI & BUTTONS FIX --- */
        .shaka-bottom-controls { display: flex; align-items: center; }
        
        /* Quality menu ko thik karne ke liye */
        .shaka-settings-menu { 
            background: rgba(20, 20, 20, 0.95); 
            border-radius: 8px; 
            font-family: sans-serif;
        }

        /* Gol gol circle (spinner) fix */
        .shaka-spinner-container {
            display: flex !important;
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const container = document.querySelector('.shaka-video-container');
        const player = new shaka.Player(video);
        
        // --- QUALITY BUTTON FIX ---
        // 'overflow_menu' ko include karna padta hai quality settings ke liye
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'mute', 'overflow_menu', 'fullscreen'],
            'overflowMenuButtons' : ['quality', 'playback_rate']
        });

        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 2, 
                rebufferingGoal: 1,
                lowLatencyMode: true,
                jumpOnHung: true,
                stallThreshold: 2
            },
            abr: { enabled: true } // Quality change karne ke liye ABR on hona chahiye
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            if (streamUrl.includes('jio')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            video.play();
        } catch (e) { console.error("Load Error:", e); }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
