<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        #channelTitle { position: absolute; left: 10px; top: 10px; color: #fff; z-index: 100; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
    <div id="channelTitle">Live Stream</div>
</div>

<script>
    async function init() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        // 1. Pura URL uthao
        const currentHref = window.location.href;
        const urlParams = new URLSearchParams(window.location.search);
        
        let m3u8OrMpd = urlParams.get('url');
        let kid = urlParams.get('keyId');
        let key = urlParams.get('key');

        // 2. AGAR LINK MEIN "|" HAI (Naya format detect karne ke liye)
        if (currentHref.includes('|drmScheme=')) {
            // Link se DRM data nikalo
            const drmPart = currentHref.split('drmLicense=')[1];
            if (drmPart) {
                const keys = drmPart.split(':');
                kid = keys[0];
                key = keys[1];
            }
            // URL ko clean karo (sirf .mpd tak rakho)
            if (m3u8OrMpd.includes('|')) {
                m3u8OrMpd = m3u8OrMpd.split('|')[0];
            }
        }

        if (!m3u8OrMpd) return;

        // 3. DRM Config
        if (kid && key) {
            player.configure({
                drm: { clearKeys: { [kid]: key } }
            });
        }

        // 4. Headers (JioTV ke liye)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (m3u8OrMpd.includes('jio')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13)";
            }
        });

        try {
            await player.load(m3u8OrMpd);
            console.log('Video loaded!');
        } catch (e) {
            console.error('Error loading video', e);
        }
    }

    document.addEventListener('shaka-ui-loaded', init);
    document.addEventListener('shaka-polyfill-installed', init);
</script>
</body>
</html>
