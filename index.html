<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cricket Yoddha - Secure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
        #video { width: 100%; height: 100%; }
        /* Right click rokne ke liye overlay */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="no-select" oncontextmenu="return false;">

<div class="shaka-video-container youtube-theme" data-shaka-player id="p-cont">
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    // 1. DOMAIN LOCK (Apni domain yahan likho)
    const allowedDomain = "yourdomain.com"; 
    if (!window.location.hostname.includes(allowedDomain)) {
        document.body.innerHTML = "<h1>Unauthorized Access</h1>";
    }

    (function(_0x123){
        async function _init() {
            shaka.polyfill.installAll();
            const _v = document.getElementById('video');
            const _p = new shaka.Player(_v);
            const _ui = new shaka.ui.Overlay(_p, document.getElementById('p-cont'), _v);

            // Encryption/Encoding ka ek layer
            const _u = btoa(window.location.href); 
            const _loc = atob(_u);

            let _s = "", _k = "", _y = "";

            try {
                // Logic ko simplify karne ki jagah split logic ko obfuscate kiya
                if (_loc.includes("url=")) {
                    _s = _loc.split("url=")[1].split(/[|&]/)[0];
                }
                
                if (_loc.includes("drmLicense=")) {
                    const _d = _loc.split("drmLicense=")[1].split("&")[0].split(":");
                    _k = _d[0]; _y = _d[1];
                }

                if (!_s) return;

                if (_k && _y) {
                    _p.configure({ drm: { clearKeys: { [_k]: _y } } });
                }

                _p.getNetworkingEngine().registerRequestFilter((t, r) => {
                    r.headers['User-Agent'] = navigator.userAgent;
                    if (_s.includes('jio')) r.headers['Referer'] = 'https://www.jiotv.com/';
                });

                await _p.load(_s);
            } catch (e) { console.clear(); }
        }
        document.addEventListener('DOMContentLoaded', _init);
    })();

    // 2. DISABLE F12 & INSPECT
    document.onkeydown = function(e) {
        if(event.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'U'.charCodeAt(0)))) {
            return false;
        }
    }
</script>
</body>
</html>
