<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Yoddha - Mobile Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        /* Full Screen Mobile Look */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .shaka-video-container { 
            width: 100vw !important; 
            height: 100vh !important; 
        }

        video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: contain; 
            background: #000; 
        }

        /* Seekbar aur controls ko mobile friendly banana */
        .shaka-range-container { bottom: 50px !important; }
        .shaka-bottom-controls { padding: 0 10px !important; }
        
        /* Spinner fix */
        .shaka-spinner-container { opacity: 0 !important; visibility: hidden !important; }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1 !important; visibility: visible !important;
        }
    </style>
</head>
<body>

<div class="shaka-video-container" data-shaka-player id="videoContainer">
    <video autoplay playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        
        if (!shaka.Player.isBrowserSupported()) {
            console.error('Browser not supported!');
            return;
        }

        const video = document.getElementById('video');
        const container = document.getElementById('videoContainer');
        const player = new shaka.Player(video);
        
        // UI Configuration - Fullscreen button add kiya aur dots hataye
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': [
                'play_pause',
                'time_and_duration',
                'spacer',
                'mute',
                'quality',      // Gear icon
                'fullscreen'    // Fullscreen button
            ],
            'doubleClickForFullscreen': true
        });

        // Auto-Rotate Logic: Fullscreen hone par horizontal kar dega
        video.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {
                        console.log("Orientation lock not supported on this device.");
                    });
                }
            }
        });

        // Fast Loading Configuration
        player.configure({
            streaming: {
                bufferingGoal: 2, 
                rebufferingGoal: 1,
                lowLatencyMode: true,
                jumpOnHung: true
            },
            manifest: { dash: { ignoreMinBufferTime: true } }
        });

        // URL & DRM Parsing logic
        const params = new URLSearchParams(window.location.search);
        let streamUrl = params.get('url');
        let kid = params.get('keyId');
        let key = params.get('key');

        // Agar URL mein direct params hain (purana logic support)
        if (!streamUrl) {
            const fullUrl = window.location.href;
            streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
            if (fullUrl.includes("drmLicense=")) {
                const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
                kid = keys[0]; key = keys[1];
            }
        }

        if (!streamUrl) return;

        // DRM Setup
        if (kid && key) {
            player.configure({
                drm: { clearKeys: { [kid]: key } }
            });
        }

        // Network Filters
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            console.log("Stream Loaded Successfully");
        } catch (e) {
            console.error("Error loading stream:", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
