<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - YouTube Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }

        /* --- YOUTUBE UI CUSTOMIZATION --- */
        .shaka-bottom-controls { 
            display: flex; 
            align-items: center; 
            padding: 0 10px !important;
        }
        
        /* Buttons ki spacing aur size */
        .shaka-controls-button-panel .shaka-current-time { font-size: 14px; margin-left: 10px; }
        
        /* Spinner (Gol gol circle) ko sirf extreme case mein dikhane ke liye */
        .shaka-spinner-container {
            opacity: 0 !important;
            transition: opacity 0.3s;
        }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1 !important;
        }

        /* Settings menu ka look change karne ke liye */
        .shaka-settings-menu {
            background: rgba(28, 28, 28, 0.9) !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        // --- YOUTUBE BUTTONS SETUP ---
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': [
                'play_pause', 
                'mute', 
                'volume', 
                'time_and_duration', 
                'spacer', 
                'overflow_menu', // Isme Quality aur Speed aayegi YouTube ki tarah
                'fullscreen'
            ],
            'overflowMenuButtons' : ['quality', 'playback_rate'],
            'addCustomButtons': true
        });

        // URL Parsing logic
        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 4, 
                rebufferingGoal: 2,
                lowLatencyMode: true,
                jumpOnHung: true,
                stallThreshold: 1
            },
            abr: { enabled: true } 
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            video.play().catch(() => {});
        } catch (e) {
            console.error(e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
