<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        // --- URL SE DATA NIKALNE KA NAYA TARIKA ---
        const fullUrl = window.location.href;
        
        // 1. Stream URL nikalo
        let streamUrl = "";
        if (fullUrl.includes("url=")) {
            streamUrl = fullUrl.split("url=")[1].split("|")[0].split("&")[0];
        }

        // 2. DRM Keys nikalo (PV-CDN format ke liye)
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const drmData = fullUrl.split("drmLicense=")[1].split("&")[0];
            const keys = drmData.split(":");
            kid = keys[0];
            key = keys[1];
        } else {
            // Normal format ke liye
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId');
            key = params.get('key');
        }

        if (!streamUrl) return;

        // DRM Configuration
        if (kid && key) {
            player.configure({
                drm: {
                    clearKeys: { [kid]: key }
                }
            });
        }

        // Networking Engine (Headers fix)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            // Sabhi DASH streams ke liye common headers
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            if (streamUrl.includes('jio')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
            }
        });

        try {
            await player.load(streamUrl);
            console.log("Success!");
        } catch (error) {
            console.error("Error Code:", error.code, "Data:", error.data);
        }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
