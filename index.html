<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Final Stable Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; }

        /* --- UI & BUTTONS FIX --- */
        .shaka-bottom-controls { display: flex; align-items: center; }
        
        /* Gol-gol circle (Spinner) ko tabhi dikhao jab sach mein zarurat ho */
        .shaka-spinner-container {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        // --- BUTTONS SETUP ---
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': ['play_pause', 'mute', 'quality', 'fullscreen'],
            'addCustomButtons': true
        });

        // URL Parsing logic
        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        // --- STABILITY & BUFFER FIX ---
        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 4,           // 4 second ka buffer load karega (Taki ruke nahi)
                rebufferingGoal: 2,         // Agar stream rukti hai toh 2 second load hote hi chalu
                bufferBehind: 0,
                lowLatencyMode: true,
                autoLowLatency: true,
                stallThreshold: 1,          // 1 second se zyada pause nahi rehne dega
                jumpOnHung: true,           // Atakne par turant aage jump karega
                inaccuracy: 0.1
            },
            manifest: {
                dash: { ignoreMinBufferTime: true },
                retryParameters: { maxAttempts: 10, baseDelay: 500 }
            },
            abr: { enabled: true } 
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            video.muted = true;
            await video.play();
            console.log("Play Started Successfully!");

            // Anti-Pause Logic: Agar video stuck ho jaye toh reset karega
            player.addEventListener('error', () => { window.location.reload(); });
            
        } catch (e) {
            console.error("Load Error:", e);
            if (e.code == 1001) { // Agar network error ho toh reload
                 setTimeout(() => { window.location.reload(); }, 2000);
            }
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
