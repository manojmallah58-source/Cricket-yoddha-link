<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha - Instant Play Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; }

        /* --- GOL GOL CIRCLE (SPINNER) FIX --- */
        /* Spinner ko tab tak hide rakho jab tak buffering extreme na ho */
        .shaka-spinner-container {
            opacity: 0 !important;
            visibility: hidden !important;
            transition: opacity 0.5s;
        }
        /* Agar video 3 second se zyada ruke tabhi dikhao */
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        // UI Configuration (Buttons wahi rakhe hain jo aapne mange the)
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({ 
            'controlPanelElements': ['play_pause', 'mute', 'quality', 'fullscreen'],
            'doubleClickForFullscreen': true
        });

        // URL Parsing logic
        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        // --- INSTANT PLAY CONFIGURATION ---
        player.configure({
            drm: { clearKeys: (kid && key) ? { [kid]: key } : {} },
            streaming: {
                bufferingGoal: 0.1,        // Sirf 0.1 second ka data aate hi play
                rebufferingGoal: 0.1,      // Buffering hone par turant start
                lowLatencyMode: true,
                autoLowLatency: true,
                inaccuracy: 0,             // Precise loading
                jumpOnHung: true,          // Atakne par turant aage jump
                stallThreshold: 1          // 1 second se zyada wait nahi karega
            },
            manifest: { 
                dash: { ignoreMinBufferTime: true },
                retryParameters: { maxAttempts: 5 } 
            }
        });

        // Headers optimization
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            
            // Force play after load
            video.muted = true;
            await video.play();
            console.log("Instant Start Success!");

            // Ek extra check: agar video paused state mein rahe toh force play karega
            setInterval(() => {
                if (video.paused && !video.ended) {
                    video.play().catch(() => {});
                }
            }, 1000);

        } catch (e) {
            console.error("Load Error:", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
