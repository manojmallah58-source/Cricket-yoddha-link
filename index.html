<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Load Shaka Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .manual-play-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8); color: white; padding: 20px 30px;
            border-radius: 8px; cursor: pointer; font-size: 18px; z-index: 2000;
            border: 2px solid #ff0000; display: none;
        }
        #channelTitle { position: absolute; left: 10px; top: 10px; color: #fff; font-size: 14px; z-index: 1500; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player-container>
    <video autoplay muted playsinline id="video" data-shaka-player poster="https://blogger.googleusercontent.com/img/a/AVvXsEiGqaZeRBZ6Y7yV5ZYSRiNRhBa5q9_EMx7R5TJcHd3XJwwHh2YhNOGt76Y4vEcUIjvIaA7W-Tw1RyMLP-4WZwVHA4mk18zwXl7HdSL5WabprIasDOWJO7jpL0zTQB4p_y7X0Rv0xwe-cJ-GvxofAgeRp2FIiNgB90n_b8Cqw0sAaZqVhJg_fi9UyfSO8KY"></video>
    <div id="channelTitle"></div>
    <div class="manual-play-button" id="manualPlayButton">▶ Click to Play</div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById('video');
        const container = document.querySelector('.shaka-video-container');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, container, video);

        // --- HARDCORE URL PARSING ---
        const fullLocation = window.location.href;
        let manifestUri = '';
        let keyId = '';
        let key = '';

        if (fullLocation.includes('url=')) {
            let queryPart = fullLocation.split('url=')[1];
            if (queryPart.includes('|')) {
                const parts = queryPart.split('|');
                manifestUri = decodeURIComponent(parts[0]);
                const drmPart = parts.find(p => p.includes('drmLicense='));
                if (drmPart) {
                    const keys = drmPart.split('drmLicense=')[1].split(':');
                    keyId = keys[0]; key = keys[1];
                }
            } else {
                manifestUri = decodeURIComponent(queryPart.split('&')[0]);
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const cookieHeader = urlParams.get('cookie') || '';
        document.getElementById('channelTitle').textContent = urlParams.get('name') || '';

        // --- DRM CONFIG ---
        if (keyId && key) {
            player.configure({ drm: { clearKeys: { [keyId]: key } } });
        }

        // --- NETWORKING (Same to Same) ---
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['Referer'] = 'https://www.jiotv.com/';
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            if (cookieHeader) {
                request.headers['Cookie'] = cookieHeader;
                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes('__hdnea__=')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + cookieHeader;
                }
            }
        });

        // --- FAST START CONFIG (Buffering Fix) ---
        player.configure({
            streaming: {
                bufferingGoal: 2,        // Sirf 2 sec ka buffer banaye
                rebufferingGoal: 1,      // Playback stop hone par sirf 1 sec load kare
                bufferBehind: 0,
                lowLatencyMode: true,
                jumpLargeGaps: true,
                inaccurateManifestTolerance: 0,
                startAtLiveEdge: true    // Live stream ko turant edge se start kare
            },
            manifest: {
                availabilityWindowOverride: 10
            }
        });

        const manualBtn = document.getElementById('manualPlayButton');

        try {
            await player.load(manifestUri);
            video.play().catch(() => { manualBtn.style.display = 'block'; });
        } catch (e) {
            console.error('Error:', e);
            manualBtn.style.display = 'block';
        }

        manualBtn.addEventListener('click', async () => {
            video.muted = false;
            await video.play();
            manualBtn.style.display = 'none';
        });
    });
</script>
</body>
</html>
