<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Yoddha - Mobile Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .shaka-video-container { width: 100vw !important; height: 100vh !important; }
        video { width: 100% !important; height: 100% !important; object-fit: contain; background: #000; }
        .shaka-bottom-controls { display: flex; align-items: center; padding: 0 15px !important; height: 50px; }
        .shaka-range-container { bottom: 45px !important; }
        .shaka-spinner-container { opacity: 0 !important; visibility: hidden !important; }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container { opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) { return; }

        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'quality', 'language', 'overflow_menu']
        });

        // Fast Load Config
        player.configure({
            streaming: { bufferingGoal: 2, rebufferingGoal: 1, lowLatencyMode: true },
            manifest: { dash: { ignoreMinBufferTime: true } }
        });

        // --- FIXED URL & KEY LOGIC ---
        const params = new URLSearchParams(window.location.search);
        let streamUrl = params.get('url');
        let kid = params.get('keyId');
        let key = params.get('key');

        // Agar URL search params se nahi mila, toh aapka purana logic
        if (!streamUrl) {
            const fullUrl = window.location.href;
            streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
            if (fullUrl.includes("drmLicense=")) {
                const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
                kid = keys[0]; key = keys[1];
            }
        }

        // --- STATIC FALLBACK (Agar link na mile toh ye chalega) ---
        if (!streamUrl) {
            streamUrl = "https://qw.live.pv-cdn.net/OTTB/lhr-nitro/live/clients/dash/enc/fb6jy4pxts/out/v1/f8fa17f087564f51aa4d5c700be43ec4/cenc.mpd";
            kid = "f288380ca4cef9ad3f27a92a08e9bb8b";
            key = "9f18d26291d9230833501f7f822f6875";
        }

        if (kid && key) {
            player.configure({
                drm: { clearKeys: { [kid]: key } }
            });
        }

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            await player.load(streamUrl);
            console.log("Match Loaded!");
        } catch (e) {
            console.error("Error code", e.code, "object", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
