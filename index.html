</body><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Yoddha - Mobile Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        /* Full Screen Mobile Look */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        .shaka-video-container { 
            width: 100vw !important; 
            height: 100vh !important; 
        }

        /* Video ko puri screen par fit karne ke liye */
        video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: contain; /* Ya 'cover' agar aapko black bars nahi chahiye */
            background: #000; 
        }

        /* Bottom Controls setup as per your image */
        .shaka-bottom-controls {
            display: flex;
            align-items: center;
            padding: 0 10px 5px 10px !important; /* Mobile touch friendly padding */
            height: 55px;
        }

        /* Seekbar Mobile optimization */
        .shaka-range-container { bottom: 50px !important; width: 95% !important; left: 2.5% !important; }
        .shaka-volume-bar { width: 60px !important; }

        /* Spinner fix */
        .shaka-spinner-container { opacity: 0 !important; visibility: hidden !important; }
        .shaka-video-container[data-shaka-player-is-buffering="true"] .shaka-spinner-container {
            opacity: 1 !important; visibility: visible !important;
        }

        /* Quality/Lang buttons size for mobile */
        .shaka-bottom-controls button { font-size: 14px !important; }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
</div>

<script>
    async function initPlayer() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const container = document.querySelector('.shaka-video-container');
        
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
            'controlPanelElements': [
                'play_pause',
                'time_and_duration',
                'mute',
                'volume',
                'spacer',
                'quality',
                'language',
                'overflow_menu'
            ]
        });

        // Fast Loading & Low Latency Configuration
        player.configure({
            streaming: {
                bufferingGoal: 1,           // Sirf 1 second data buffer karega start hone se pehle (Super Fast)
                rebufferingGoal: 0.5,       // Re-buffer fast karega
                lowLatencyMode: true,
                autoLowLatencyMode: true,
                infiniteAds: false,
                jumpOnHung: true,
                stallThreshold: 1
            },
            manifest: { 
                dash: { ignoreMinBufferTime: true },
                retryParameters: { timeout: 2000, maxAttempts: 5 } // Fast retry if network fails
            }
        });

        // URL Parsing
        const fullUrl = window.location.href;
        let streamUrl = fullUrl.split("url=")[1]?.split("|")[0]?.split("&")[0];
        
        let kid = "", key = "";
        if (fullUrl.includes("drmLicense=")) {
            const keys = fullUrl.split("drmLicense=")[1].split("&")[0].split(":");
            kid = keys[0]; key = keys[1];
        } else {
            const params = new URLSearchParams(window.location.search);
            kid = params.get('keyId'); key = params.get('key');
        }

        if (!streamUrl) return;

        // DRM Setup
        if (kid && key) {
            player.configure({
                drm: { clearKeys: { [kid]: key } }
            });
        }

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (streamUrl.includes('jio') || streamUrl.includes('bpcdn')) {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['Origin'] = 'https://www.jiotv.com';
            }
        });

        try {
            // Player Load start
            await player.load(streamUrl);
            video.muted = false; // Auto-unmute try karega agar browser allow kare
            await video.play();
        } catch (e) {
            console.error("Load Error:", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>

</html>
