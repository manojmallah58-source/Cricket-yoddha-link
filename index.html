<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Yoddha Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        .shaka-video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #channelTitle { position: absolute; left: 15px; top: 15px; color: #fff; z-index: 100; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="shaka-video-container youtube-theme" data-shaka-player>
    <video autoplay muted playsinline id="video"></video>
    <div id="channelTitle">Cricket Yoddha Live</div>
</div>

<script>
    async function init() {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            console.error('Browser not supported!');
            return;
        }

        const video = document.getElementById('video');
        const container = document.querySelector('.shaka-video-container');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, container, video);

        // --- Low Latency & Fast Start Config ---
        player.configure({
            streaming: {
                bufferingGoal: 2,           // Kam data par bhi chalega
                rebufferingGoal: 1,        // Lag hone par turant start hoga
                lowLatencyMode: true,      // Live match ke liye best
                jumpLargeGaps: true        // Agar stream ruk jaye toh aage jump kar lega
            },
            manifest: {
                retryParameters: { maxAttempts: 5 }
            }
        });

        // URL parsing logic
        const urlParams = new URLSearchParams(window.location.search);
        let m3u8OrMpd = urlParams.get('url');
        let kid = urlParams.get('keyId');
        let key = urlParams.get('key');

        // Handling the pipe "|" format automatically
        if (m3u8OrMpd && m3u8OrMpd.includes('|')) {
            const parts = m3u8OrMpd.split('|');
            m3u8OrMpd = parts[0]; 
            // Agar keys URL ke andar pipe ke baad hain toh yahan logic add kar sakte hain
        }

        // DRM Setup
        if (kid && key) {
            player.configure({
                drm: {
                    clearKeys: { [kid]: key }
                }
            });
        }

        // JioTV/Special Headers Filter
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (m3u8OrMpd.includes('jio') || m3u8OrMpd.includes('tata')) {
                // Request headers (Note: Browser CORS limits apply)
                request.headers['Referer'] = 'https://www.jiotv.com/';
            }
        });

        try {
            await player.load(m3u8OrMpd);
            console.log('Match Loaded Successfully!');
        } catch (e) {
            console.error('Error loading video:', e.code);
        }
    }

    document.addEventListener('shaka-ui-loaded', init);
    document.addEventListener('shaka-polyfill-installed', init);
</script>
</body>
</html>
